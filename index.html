<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsuza Kadar 🌷</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(#ffffff, #e0f2f1); font-family: sans-serif; }
        canvas { display: block; }
        #yukleniyor {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem; color: #00695c;
            background: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="yukleniyor">Çiçekler hazırlanıyor...</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. LİNK DÜZELTİLDİ ---
    const GITHUB_GLB_URL = 'https://raw.githubusercontent.com/fortresdo/sonsuzakadar/main/flower_bouquet.glb';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 4); 

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace; 
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(5, 10, 7.5);
    directionalLight.castShadow = true;
    scene.add(directionalLight);

    let cicekBuketi = null;
    const loader = new GLTFLoader();

    // --- 2. YÜKLEME KISMI DÜZELTİLDİ ---
    loader.load(GITHUB_GLB_URL, (gltf) => {
        cicekBuketi = gltf.scene;
        
        const box = new THREE.Box3().setFromObject(cicekBuketi);
        const center = box.getCenter(new THREE.Vector3());
        cicekBuketi.position.sub(center); 
        cicekBuketi.position.y = -1;

        cicekBuketi.traverse((node) => {
            if (node.isMesh) {
                node.castShadow = true;
                node.receiveShadow = true;
            }
        });

        scene.add(cicekBuketi);
        document.getElementById('yukleniyor').style.display = 'none';
        
    }, undefined, (error) => {
        console.error('Hata:', error);
        document.getElementById('yukleniyor').innerText = 'Çiçekler yüklenemedi :(';
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        if (cicekBuketi) {
            const time = Date.now() * 0.001;
            cicekBuketi.rotation.y += 0.003; 
            cicekBuketi.position.y = Math.sin(time * 0.5) * 0.1 - 0.5; 
        }
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
